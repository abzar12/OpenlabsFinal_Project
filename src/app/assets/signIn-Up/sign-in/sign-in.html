<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">
      Sign-In
    </h2>

    <!-- Form -->
    <form class="space-y-5" (ngSubmit)="LoginFn(nglogin)" #nglogin="ngForm">
      <div class="w-full bg-green-400 text-sm text-white text-center py-3 rounded-lg mb-4" *ngIf="message">
        <p>{{message}} </p>
      </div>
      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">
          Email
        </label>
        <input type="email" name="email" (ngModel)="User.email"
          class="w-full px-4 py-2 border rounded-lg focus:border-2 focus:border-(--bg-color-secondary) focus:outline-none"
          placeholder="you@example.com" />
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">
          Password
        </label>
        <input type="password" name="password" (ngModel)="User.password"
          class="w-full px-4 py-2 border rounded-lg focus:border-2 focus:border-(--bg-color-secondary) focus:outline-none"
          placeholder="••••••••" />
      </div>

      <!-- Remember + Forgot -->
      <div class="flex items-center justify-between text-sm">
        <a href="#" class="text-blue-500 hover:underline">
          Forgot password?
        </a>
      </div>

      <!-- Button -->
      <button type="submit"
        class="w-full bg-(--bg-color-primary) cursor-pointer text-white py-2 rounded-lg hover:bg-(--bg-color-secondary) hover:font-bold transition">
        Sign In
      </button>
    </form>
    <!-- Signup -->
    <p class="text-center text-sm text-gray-600 mt-6">
      Don't have an account?
      <a [routerLink]="['/sign-up']" class="text-(--btntext-color) hover:underline">Sign up</a>
    </p>
  </div>
</div>
