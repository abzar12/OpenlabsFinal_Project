<app-navbar></app-navbar>
<app-hero></app-hero>
<!-- ---------------------------- filter box --------------------------- -->
<div class="flex flex-wrap gap-5 justify-center w-130 mx-auto px-5">
    <div class="" *ngFor=" let filter of filters">
        <div  (click)="filterClicked(filter)" [class]=" filterValues.type === filter ? 'bg-(--bg-color-primary) text-center border-2 hover:text-(--bg-color-primary) hover:bg-transparent text-white border-(--bg-color-primary)  py-2 px-5 rounded-[20px] transition duration-500 cursor-pointer' : 'border-2 hover:text-white hover:bg-(--bg-color-primary) text-(--bg-color-primary) border-(--bg-color-primary)  py-2 px-5 rounded-[20px] transition duration-500 cursor-pointer'">
            <p  class="">{{filter}}</p>
        </div>
    </div>
</div>
<div *ngIf="!loading">
    <app-item-card [Items]="cardItems" [is_loading]="loading"></app-item-card>
</div>
<app-footer></app-footer>
